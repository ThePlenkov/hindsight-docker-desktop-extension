services:
  api:
    image: ${DESKTOP_PLUGIN_IMAGE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - HINDSIGHT_API_LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - HINDSIGHT_API_LLM_MODEL=${LLM_MODEL:-}
      - HINDSIGHT_API_LLM_API_KEY=${LLM_API_KEY:-}
      - HINDSIGHT_API_LLM_BASE_URL=${LLM_BASE_URL:-}
      - HINDSIGHT_API_LLM_MAX_CONCURRENT=${LLM_MAX_CONCURRENT:-1}
      - HINDSIGHT_API_ENABLE_OBSERVATIONS=${ENABLE_OBSERVATIONS:-false}
      - HINDSIGHT_API_SKIP_LLM_VERIFICATION=true
      - HINDSIGHT_API_LAZY_RERANKER=true
    volumes:
      - hindsight-data:/home/hindsight/.pg0

volumes:
  hindsight-data:
